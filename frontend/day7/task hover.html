<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Grid Layout</title>
    <style>

        * {
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ff9b7a 0%, #e65c5c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .header {
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 24px;
            padding-left: 20px;
            letter-spacing: 0.5px;
        }

        .grid-wrapper {
            background: white;
            border-radius: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card {
            background: white;
            padding: 50px 30px;
            display: flexbox;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: transform 1s , 
                        box-shadow 0.3s ease, 
                        border-radius 0.3s ease;
            
            border-right: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #e6e6e6; 
            margin-bottom: 24px;
            transition: background 0.3s ease;
        }

        .title {
            font-weight: 700;
            color: #4a4a4a;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .card:hover {
            transform: scale(1.15);
            z-index: 10;
            
            border-radius: 12px ; 
            
            border-color: transparent; 
            
            box-shadow: 0 30px 60px -10px rgba(220, 50, 50, 0.35), 0 10px 20px -5px rgba(0,0,0,0.1);
        }

        .card:hover .icon-circle {
            background: linear-gradient(135deg, #f05a66 0%, #4a3473 100%);
        }

  
      
    </style>
</head>
<body>

    <div class="container">

        <div class="header">Transition</div>
        

        <div class="grid-wrapper">

            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 1</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
            

            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 2</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
            

            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 3</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
            

            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 4</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
            

            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 5</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
            
            <div class="card">
                <div class="icon-circle"></div>
                <div class="title">Section 6</div>
                <div class="subtitle">Lorem ipsum</div>
            </div>
        </div>
    </div>

</body>
</html>
