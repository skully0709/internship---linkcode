<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Radius</title>
    <style>
        div{
            display: inline-block;
            height:200px;
            width : 200px;
            margin: 10px

        }
        #leaf{
            background-color: aqua;
            border-radius: 0% 80% 0% 80%;
            color:white;
            text-align:center;
             
            
        }
        #halfoval{
            background-color: blue;
            border-radius: 0% 0% 190px 190px;
            color:white;
            text-align:center;
             
            width : 400px;
        }
        #oval{
            background-color: orange;
            border-radius: 80% 80% 80% 80%;
            
            color:white;
            text-align:center;
             
            width : 400px;
        }
        #twist{
            background-color: green;
            border-radius: 0% 100% 0% 100%;
            color:white;
            text-align:center;
             
            width : 400px;
            
        }
        #twisttwo{
            background-color: purple;
            border-radius: 0% 50% 0% 50%;
            color:white;
            text-align:center;
             
            width : 400px;
            
        }
        #circle{
            background-color: red;
            border-radius: 100% 100% 100% 100%;
            color:white;
            text-align:center;
             
            
        }
        #tab{
            background-color: rgb(246, 12, 226);
            border-radius: 0% 0% 50% 50%;
            color:white;
            text-align:center;
             
            
        }
        #threesided{
            background-color: rgb(12, 58, 209);
            border-radius: 0% 100% 100% 100%;
            color:white;
            text-align:center;
             
            
        }

    </style>
</head>

<body>

    <div id="leaf">
        <br>
        <br>
        <h1>Leaf</h1>
    </div>
    <div id="halfoval">
        <br>
        <br>
        <h1>Half Oval</h1>
    </div>
    <div id="oval">
        <br>
        <br>
        <h1>Oval</h1>
    </div>
    <div id="twist">
        <br>
        <br>
        <h1>Twist</h1>
    </div>
    <div id="twisttwo">
        <br>
        <br>
        <h1>Twist Two</h1>
    </div>
    <div id="circle">
        <br>
        <br>
        <h1>Circle</h1>
    </div>
    <div id="tab">
        <br>
        <br>
        <h1>Tab</h1>
    </div>
    <div id="threesided">
        <br>
        <br>
        <h1>Three Sided</h1>
    </div>
    
</body>
</html>
