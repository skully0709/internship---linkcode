<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarthak Patani - profile</title>

     <style>
        body {
            background: #a8e9ff;
            font-family: Arial, sans-serif;
            
        }

        .card {
            width: 700px;
            height: 290px;
            background: #c1eeff;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            reverse-border-radius: ;
        }

        .profile-pic {
            display: inline-block;
            vertical-align: top;
        }

        .profile-pic img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }

        .content {
            display: inline-block;
            width: 450px;
            margin-left: 30px;
        }

        h1 {
            margin: 0;
        }

        h3 {
            margin-top: 5px;
            color: #555;
        }

        p {
            color: #555;
            margin-top: 25px;
        }

        .stats {
            margin-top: 30px;
        }

        .stat {
            display: inline-block;
            width: 140px;
        }

        .stat h2 {
            margin: 0;
        }

        .stat span {
            font-weight: bold;
        }

        .follow,
        .profile-btn {
            width: 180px;
            height: 55px;
            margin-top: 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .follow {
            background: black;
            color: white;
            border: none;
        }

        .profile-btn {
            background: transparent;
            border: 2px solid gray;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="profile-pic">
            <img src="my image.png" alt="Profile">
        </div>

        <div class="content">
            <h1>Sarthak Patani</h1>
            <h3>Frontend Developer | React & JS</h3>
            <p>
                Exp: 2+ Years at TechCorp • B.Sc. in Computer Science <br> 
                Skills: HTML5, CSS3, JavaScript, React, Tailwind CSS
            </p>
            <div class="stats">
                <div class="stat">
                    <h2>2+ Yrs</h2>
                    <span>Experience</span>
                </div>

                <div class="stat">
                    <h2>15+</h2>
                    <span>Projects</span>
                </div>

                <div class="stat">
                    <h2>Remote</h2>
                    <span>Availability</span>
                </div>
            </div>
            <button class="follow">Hire Me</button>
            <button class="profile-btn">View CV</button>
        </div>
    </div>

</body>
</html>
