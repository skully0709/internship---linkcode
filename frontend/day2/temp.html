<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="">
         <label for="">Enter your name:*</label>
         <input type="text" name="" id="" required>
         <br> <br>
         <input type="email" name="" id="" placeholder="Enter your mail here">
         <br> <br>
         <label for="">Enter mobile no:</label>
         <input type="number" name="" id="">
         <input type="tel" name="" id="" maxlength="10" minlength="10">
         <br> <br>
         <label for="">Select DOB</label>
         <input type="date" name="" id="">
         <input type="datetime" name="" id="">
         <input type="datetime-local" name="" id="">
         <br><br>
         <label for="">Select Gender</label>
         <input type="radio" name="gender" id=""><label for="">Male</label>
         <input type="radio" name="gender" id=""><label for="">Female</label>
         <input type="radio" name="gender" id=""><label for="">Other</label>
         <br><br>
         <label for="">Select subjects:</label>
         <input type="checkbox" name="" id="" checked> <label for="">Maths</label>
         <input type="checkbox" name="" id=""> <label for="">Science</label>
         <input type="checkbox" name="" id=""> <label for="">Marathi</label>
         <input type="checkbox" name="" id=""> <label for="">English</label>
         <br><br>
         <label for="">Upload Documents</label>
         <input type="file" name="" id="" accept=".pdf">
         <br><br>
         <input type="color" name="" id="">
         0%<input type="range" name="" id="">100%
         <br> <br>
         <select name="" id="">
            <option value="" disabled selected hidden>Select State</option>
            <option value="">Gujrat</option>
            <option value="">Maharashtra</option>
            <option value="">Goa</option>
            <option value="">Rajsthan</option>
         </select>
         <textarea name="" id="" rows="10" cols="30" placeholder="Enter your feedback here"></textarea>
         <input type="submit" value="SUBMIT">
        </form>
</body>
</html>
