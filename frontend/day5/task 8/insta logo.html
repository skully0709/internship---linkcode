<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Logo</title>

<style>

    .instagram-logo{
        width:350px;
        height:350px;
        border-radius:80px;

        background-image: radial-gradient(
            circle at 30% 107%,
            #fdf497 0%,
            #fd5949 45%,
            #d6249f 60%,
            #285AEB 100%
        );
        padding-top:58px;
        padding-left:58px;
    }

    .camera{
        width:245px;
        height:245px;
        border:22px solid white;
        border-radius:60px;
    }

    .flash{
        width:30px;
        height:30px;
        background:white;
        border-radius:50%;
        margin-left:190px;
        margin-top:20px;
    }

    .lens{
        width:100px;
        height:100px;
        border:22px solid white;
        border-radius:50%;
        margin-left:50px;
        margin-top:5px;
    }

</style>
</head>
<body>

<div class="instagram-logo" style="margin: 100px;">
    <div class="camera">
        <div class="flash"></div>
        <div class="lens"></div>
    </div>
</div>

</body>
</html>
