<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <style>
        /* Dark background to contrast with the white grid container, matching your image */
        body {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: serif; /* Matches the font style in the image */
        }

        .grid-container {
            display: grid;
            /* Creates 5 columns: slightly wider first column, and 4 equal sub-columns */
            grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
            /* Creates 4 equal height rows */
            grid-template-rows: repeat(4, 1fr);
            gap: 10px; /* The white space between boxes */
            background-color: white; /* Creates the white borders/gaps */
            padding: 10px; /* Outer white border */
            width: 90%;
            max-width: 800px;
            aspect-ratio: 1.35; /* Maintains the overall rectangular shape of the image */
        }

        .box {
            background-color: #ff0000; /* Standard red */
            color: black;
            padding: 4px 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* --- Grid Item Placements --- */
        .box1 {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
        }

        .box2 {
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }

        .box3 {
            grid-column: 4 / 6;
            grid-row: 1 / 2;
        }

        .box4 {
            grid-column: 2 / 3;
            grid-row: 2 / 4;
        }

        .box5 {
            grid-column: 3 / 5;
            grid-row: 2 / 4;
        }

        .box6 {
            grid-column: 5 / 6;
            grid-row: 2 / 5; /* Spans down to the bottom */
        }

        .box7 {
            grid-column: 1 / 2;
            grid-row: 3 / 5;
        }

        .box8 {
            grid-column: 4 / 5;
            grid-row: 4 / 5;
        }

        .box9 {
            grid-column: 2 / 4;
            grid-row: 4 / 5;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
        <div class="box box5"></div>
        <div class="box box6"></div>
        <div class="box box7"></div>
        <div class="box box8"></div>
        <div class="box box9"></div>
    </div>

</body>
</html>
